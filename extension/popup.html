<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { width: 280px; padding: 16px; font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: #17191f; color: #f3f3f3; }
    h2 { font-size: 16px; margin-bottom: 12px; }
    .status { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 13px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.ok { background: #22c55e; }
    .dot.err { background: #ef4444; }
    .info { font-size: 12px; color: #94a3b8; margin-bottom: 8px; line-height: 1.4; }
    button { width: 100%; padding: 10px; border: none; border-radius: 8px; background: #2563eb; color: #fff; font-weight: 600; font-size: 14px; cursor: pointer; margin-top: 8px; }
    button:disabled { opacity: 0.5; }
  </style>
</head>
<body>
  <h2>Manga Translator</h2>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="status-text">확인 중...</span>
  </div>
  <div class="info" id="info"></div>
  <button id="translate-all">현재 페이지 전체 번역</button>

  <script src="popup.js"></script>
</body>
</html>
